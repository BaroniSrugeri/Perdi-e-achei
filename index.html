<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perdi & Achei | Central de achados e perdidos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="hero" id="inicio" aria-label="Inicio">
        <nav class="nav">
            <a class="marca" href="#inicio">
                <img src="assets/logo-perdi-achei.svg" alt="" class="marca-img" />
            </a>
            <div class="nav-links" aria-label="Navegação Principal">
                <a href="#cadastro">Cadastrar</a>
                <a href="#registros">Registros</a>
            </div>
        </nav>

        <section class="hero-conteudo">
            <div class="hero-texto">
                <h1>Perdeu? Achou? Registre aqui</h1>
                <p>Uma Central simples para Cadastrar
                    objetos perdidos ou encontrados na unipar.</p>
                <div class="acao">

                    <a href="#cadastro" class="btn btn-principal">
                        Cadastrar Objeto
                    </a>
                    <a href="#registros" class="btn btn-secundario">
                        Ver Registros
                    </a>
                </div>
            </div>
            <aside class="hero-card" aria-label="Resumo do Sistema">
                <img src="assets/hero-achados-perdidos.svg" alt="Ilustração de Objetos" />
                <div class="hero-metricas">

                    <div>
                        <strong id="totalRegistros">0</strong>
                        <span>Registros</span>
                    </div>
                </div>
            </aside>
        </section>
    </header>
    <main class="container">
        <section class="grid-principal">
            <article class="card" id="cadastro">
                <div class="card-cabecalho">
                    <img src="assets/formulario.svg">
                    <div>
                        <h2>Cadastrar Objeto</h2>
                        <p>Informe os dados do objeto</p>
                    </div>
                </div>
                <form id="formObjeto" autocomplete="off">
                    <label>Nome do objeto</label>
                    <input type="text" name="objeto" maxlength="80" placeholder="Ex: Mochila, chave" required/>
                    <div class="coluna-2">
                        <label>Tipo</label>
                        <select name="tipo" id="" required>
                            <option value="">Selecione</option>
                            <option value="perdido">perdido</option>
                            <option value="encontrado">encontrado</option>
                        </select>
                        <label>Data</label>
                        <input type="date" name="date" required />
                    </div>
                    <label>Local</label>
                    <input type="text" name="local" maxlength="100" placeholder="Ex: Laboratorio 2">
                    <label>Descrição</label>
                    <textarea name="Descrição" maxlength="360" placeholder="Descreva a cor" required></textarea>
                    <label>Contato</label>
                    <input type="text" name="contato" maxlength="100" placeholder="E-mail" required>

                    <button type="submit" class="btn btn-form">Salvar</button>
                </form>
            </article>
        </section>
    </main>

</body>

</html>
